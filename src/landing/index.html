<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" id="themeColor" content="#0D0B1A">
  <title>Ads2Wallet</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      background: var(--bg, #0D0B1A);
      color: var(--fg, #fff);
      min-height: 100vh;
      width: 100vw;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 32px 24px;
      min-height: 100vh;
      position: relative;
    }
    /* Background image layer */
    .bg-image {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      display: none;
    }
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: none;
    }
    body > * { position: relative; z-index: 2; }

    .top { width: 100%; max-width: 420px; }
    .brand-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; letter-spacing: 0.04em;
      color: var(--fg-soft, rgba(255,255,255,0.65));
    }
    .brand-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent, #00D4AA); }
    .main {
      width: 100%; max-width: 420px;
      text-align: center;
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px;
    }
    .logo-area {
      width: 320px; max-width: 75vw;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .logo-area img {
      width: 100%; height: auto;
      object-fit: contain;
    }
    .logo-letter {
      display: none;
    }
    .cta-section { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 12px; }
    .text-section {
      margin-top: 12px;
    }
    h1 {
      font-size: 26px; font-weight: 700; line-height: 1.2;
      letter-spacing: -0.02em;
      color: var(--fg, #ffffff);
      text-shadow: 0 1px 8px rgba(0,0,0,0.12);
    }
    h1 small {
      display: block;
      font-size: 15px; font-weight: 400;
      color: var(--fg-soft, rgba(255,255,255,0.72));
      margin-top: 8px;
      letter-spacing: 0;
      line-height: 1.45;
    }
    .claim {
      font-size: 14px; line-height: 1.5;
      color: var(--fg-soft, rgba(255,255,255,0.65));
      max-width: 300px;
      margin: 8px auto 0;
    }
    .cta {
      display: flex; align-items: center; justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.2s ease;
      font-family: inherit;
      text-decoration: none;
      box-sizing: border-box;
    }
    .cta:active { transform: scale(0.988); }
    .cta[disabled] { opacity: 0.6; cursor: default; }
    .cta-icon { flex-shrink: 0; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; }
    .cta-icon svg { width: 26px; height: 26px; display: block; }
    .cta-wallet--apple {
      background: #000;
      color: #fff;
      box-shadow: 0 8px 28px rgba(0,0,0,0.22);
    }
    .cta-wallet--apple .cta-icon svg { width: 22px; height: 22px; }
    .cta-wallet--google {
      background: #fff;
      color: #1f1f1f;
      border: 1px solid #dadce0;
      box-shadow: 0 2px 14px rgba(60,64,67,0.12);
    }
    .cta-wallet--samsung {
      background: #1428a0;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 8px 28px rgba(20,40,160,0.28);
    }
    .cta-wallet--samsung .cta-icon {
      width: auto;
      min-width: 90px;
      justify-content: flex-start;
    }
    .cta-wallet--samsung .cta-label {
      flex: 1;
      text-align: center;
      transform: translateX(-8px);
    }
    .samsung-logotype {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.14em;
      line-height: 1;
      color: inherit;
    }
    .footnote {
      text-align: center;
      font-size: 12px;
      color: var(--fg-soft, rgba(255,255,255,0.55));
      opacity: 0.9;
      margin-top: 16px;
    }
    .device-note {
      text-align: center;
      font-size: 12px;
      color: var(--fg-soft, rgba(255,255,255,0.7));
      margin-top: 6px;
      min-height: 18px;
    }
    .error {
      color: #ff6b6b;
      font-size: 14px;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-image" id="bgImage"></div>
  <div class="bg-overlay" id="bgOverlay"></div>

  <div class="top">
    <div class="brand-row">
      <span class="brand-dot"></span>
      <span>Powered by Ads2Wallet</span>
    </div>
  </div>

  <div class="main">
    <!-- 1. Logo -->
    <div class="logo-area" id="logoArea">
      <span class="logo-letter" id="logoLetter">&middot;</span>
    </div>

    <!-- 2. Descriptive text after logo -->
    <div class="text-section">
      <h1 id="headline">
        <span id="brandName">Aggiungi al Wallet</span>
        <small id="subheadline">Sblocca offerte e novità sul tuo smartphone</small>
      </h1>
      <p class="claim" id="claim"></p>
    </div>

    <!-- 3. Wallet CTAs (Apple / Google / Samsung) -->
    <div class="cta-section">
      <button type="button" class="cta cta-wallet--apple" id="installBtn">
        <span class="cta-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img"><path fill="currentColor" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        </span>
        <span class="cta-label" id="btnLabel">Aggiungi ad Apple</span>
      </button>
      <a href="#" id="googleBtn" class="cta cta-wallet--google" style="display:none;" onclick="addToGoogleWallet(event)">
        <span class="cta-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </span>
        <span class="cta-label">Aggiungi a Google</span>
      </a>
      <a href="#" id="samsungBtn" class="cta cta-wallet--samsung" style="display:none;" onclick="addToSamsungWallet(event)">
        <span class="cta-icon" aria-hidden="true"><span class="samsung-logotype">SAMSUNG</span></span>
        <span class="cta-label">Aggiungi a Samsung</span>
      </a>
      <div class="error" id="error"></div>
    </div>

    <div class="footnote">
      Nessun dato richiesto · Nessun account · Cancellabile in qualsiasi momento
    </div>
    <div class="device-note" id="deviceNote"></div>
  </div>

  <script>
    (function () {
      const slug = location.pathname.replace(/^\/+|\/+$/g, '');
      const params = new URLSearchParams(location.search);
      const campaignId = params.get('c') || params.get('campaign_id');
      const utm = {};
      ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'].forEach(k => {
        const v = params.get(k);
        if (v) utm[k] = v;
      });

      window.__landingSignupContext = {
        slug,
        campaignId: campaignId || null,
        utm
      };

      const el = {
        logoArea: document.getElementById('logoArea'),
        logoLetter: document.getElementById('logoLetter'),
        brandName: document.getElementById('brandName'),
        sub: document.getElementById('subheadline'),
        claim: document.getElementById('claim'),
        btn: document.getElementById('installBtn'),
        btnLabel: document.getElementById('btnLabel'),
        error: document.getElementById('error'),
        deviceNote: document.getElementById('deviceNote'),
        bgImage: document.getElementById('bgImage'),
        bgOverlay: document.getElementById('bgOverlay')
      };

      function hexToRgb(hex) {
        hex = (hex || '#000000').replace('#', '');
        if (hex.length === 3) hex = hex.split('').map(function (c) { return c + c; }).join('');
        var n = parseInt(hex, 16);
        if (Number.isNaN(n)) return { r: 0, g: 0, b: 0 };
        return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
      }
      function relLum(hex) {
        var rgb = hexToRgb(hex);
        function lin(x) {
          x /= 255;
          return x <= 0.03928 ? x / 12.92 : Math.pow((x + 0.055) / 1.055, 2.4);
        }
        var R = lin(rgb.r), G = lin(rgb.g), B = lin(rgb.b);
        return 0.2126 * R + 0.7152 * G + 0.0722 * B;
      }
      function contrastRatio(L1, L2) {
        var hi = Math.max(L1, L2), lo = Math.min(L1, L2);
        return (hi + 0.05) / (lo + 0.05);
      }
      /** Evita sfondo chiaro + testo chiaro (o viceversa) da config brand. */
      function readableFg(bgHex, fgHex) {
        var Lb = relLum(bgHex);
        var Lf = relLum(fgHex);
        if (contrastRatio(Lb, Lf) >= 3.1) return fgHex;
        return Lb > 0.55 ? '#17181d' : '#f7f8fc';
      }
      function applyColors(bg, fg, accent) {
        fg = readableFg(bg, fg);
        var Lb = relLum(bg);
        var soft = Lb > 0.55 ? 'rgba(0,0,0,0.58)' : 'rgba(255,255,255,0.78)';
        var root = document.documentElement.style;
        root.setProperty('--bg', bg);
        root.setProperty('--fg', fg);
        root.setProperty('--fg-soft', soft);
        root.setProperty('--accent', accent);
        root.setProperty('--cta-bg', accent);
        document.getElementById('themeColor').content = bg;
        document.body.style.background = bg;
        document.body.style.color = fg;
      }

      async function loadBrand() {
        try {
          const r = await fetch(`/api/v1/brands/by-slug/${encodeURIComponent(slug)}`);
          if (!r.ok) return;
          const brand = await r.json();
          const c = brand.config || {};

          // Apply brand colors
          const bg = c.backgroundColor || '#0D0B1A';
          const fg = c.foregroundColor || '#FFFFFF';
          const accent = c.labelColor || '#00D4AA';
          applyColors(bg, fg, accent);

          // Brand name & text
          if (brand.name) {
            el.logoLetter.textContent = brand.name.charAt(0).toUpperCase();
            el.brandName.textContent = brand.name;
            document.title = `${brand.name} · Ads2Wallet`;
          }
          if (c.headline) el.brandName.textContent = c.headline;
          if (c.subheadline) el.sub.textContent = c.subheadline;
          if (c.claim) el.claim.textContent = c.claim;
          if (c.button_label) el.btnLabel.textContent = c.button_label;

          // Always try to load brand logo from endpoint
          const logoImg = new Image();
          logoImg.onload = () => {
            el.logoLetter.style.display = 'none';
            const img = document.createElement('img');
            img.src = logoImg.src;
            img.alt = brand.name || 'Logo';
            el.logoArea.appendChild(img);
          };
          logoImg.src = `/api/v1/brands/by-slug/${encodeURIComponent(slug)}/logo?t=${Date.now()}`;

          // Always try to load background image from endpoint
          const bgImg = new Image();
          bgImg.onload = () => {
            el.bgImage.style.backgroundImage = `url(${bgImg.src})`;
            el.bgImage.style.display = 'block';
            el.bgOverlay.style.background = `linear-gradient(180deg, ${bg}cc 0%, ${bg}40 40%, ${bg}cc 100%)`;
            el.bgOverlay.style.display = 'block';
          };
          bgImg.src = `/api/v1/brands/by-slug/${encodeURIComponent(slug)}/landing-bg?t=${Date.now()}`;

          setupWalletButtons(brand.wallet || {});
        } catch (e) { console.error(e); }
      }

      function setupWalletButtons(wallet) {
        var w = wallet || {};
        var ua = navigator.userAgent || '';
        var isAndroid = /android/i.test(ua);
        var isIOS = /iphone|ipad|ipod/i.test(ua);
        var googleBtn = document.getElementById('googleBtn');
        var samsungBtn = document.getElementById('samsungBtn');
        var appleBtn = document.getElementById('installBtn');
        if (!appleBtn) return;
        if (googleBtn) googleBtn.style.display = 'none';
        if (samsungBtn) samsungBtn.style.display = 'none';

        /* Mobile-first policy: mobile first, but keep desktop CTAs visible to avoid "empty page". */
        if (isIOS) {
          appleBtn.style.display = 'flex';
          if (el.deviceNote) el.deviceNote.textContent = 'Consigliato: apri da iPhone per installazione diretta Apple Wallet.';
          return;
        }
        if (isAndroid) {
          appleBtn.style.display = 'none';
          if (w.google && googleBtn) googleBtn.style.display = 'flex';
          if (w.samsung && samsungBtn) samsungBtn.style.display = 'flex';
          if (!w.google && !w.samsung) appleBtn.style.display = 'none';
          if (el.deviceNote) el.deviceNote.textContent = 'Consigliato: Android con Google/Samsung Wallet installato.';
          return;
        }
        appleBtn.style.display = 'flex';
        el.btnLabel.textContent = 'Aggiungi ad Apple';
        if (w.google && googleBtn) googleBtn.style.display = 'flex';
        if (w.samsung && samsungBtn) samsungBtn.style.display = 'flex';
        if (el.deviceNote) {
          el.deviceNote.textContent = 'Desktop supportato per avvio flusso, ma i KPI principali contano solo installazioni wallet confermate da mobile/callback.';
        }
      }

      async function install() {
        el.btn.disabled = true;
        el.error.textContent = '';
        el.btnLabel.innerHTML = '<span class="spinner"></span>';

        try {
          const r = await fetch('/api/v1/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              brand_slug: slug,
              campaign_id: campaignId || null,
              utm: Object.keys(utm).length ? utm : null
            })
          });
          if (!r.ok) {
            const err = await r.json().catch(() => ({}));
            throw new Error(err.error || 'Errore download pass');
          }
          const blob = await r.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'pass.pkpass';
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 5000);
          el.btnLabel.textContent = 'Aggiunto — apri Wallet per confermare';
          setTimeout(() => { el.btn.disabled = false; el.btnLabel.textContent = 'Aggiungi di nuovo ad Apple'; }, 2000);
        } catch (e) {
          el.error.textContent = e.message;
          el.btn.disabled = false;
          el.btnLabel.textContent = 'Riprova';
        }
      }

      el.btn.addEventListener('click', install);
      loadBrand();
    })();

    async function addToGoogleWallet(e) {
      e.preventDefault();
      var btn = document.getElementById('googleBtn');
      var lbl = btn && btn.querySelector('.cta-label');
      if (!lbl) return;
      var ctx = window.__landingSignupContext || {};
      var origHTML = btn.innerHTML;
      lbl.textContent = 'Caricamento…';
      try {
        var res = await fetch('/api/v1/signup/google-wallet', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            brand_slug: ctx.slug || location.pathname.replace(/^\/+|\/+$/g, ''),
            campaign_id: ctx.campaignId || null,
            utm: ctx.utm && Object.keys(ctx.utm).length ? ctx.utm : null
          })
        });
        if (!res.ok) {
          var err = await res.json().catch(function(){ return {}; });
          throw new Error(err.error || 'Errore');
        }
        var data = await res.json();
        if (data.save_link) {
          window.location.href = data.save_link;
        } else {
          throw new Error('Save link non disponibile');
        }
      } catch(err) {
        lbl.textContent = 'Errore — riprova';
        setTimeout(function(){ btn.innerHTML = origHTML; }, 2000);
      }
    }

    async function addToSamsungWallet(e) {
      e.preventDefault();
      var btn = document.getElementById('samsungBtn');
      if (!btn) return;
      var label = btn.querySelector('.cta-label');
      if (!label) return;
      var orig = label.textContent;
      label.textContent = 'Caricamento...';
      try {
        var ctx = window.__landingSignupContext || {};
        var res = await fetch('/api/v1/signup/samsung-wallet', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            brand_slug: ctx.slug || location.pathname.replace(/^\/+|\/+$/g, ''),
            campaign_id: ctx.campaignId || null,
            utm: ctx.utm && Object.keys(ctx.utm).length ? ctx.utm : null
          })
        });
        if (!res.ok) {
          var err = await res.json().catch(function(){ return {}; });
          throw new Error(err.error || 'Errore');
        }
        var data = await res.json();
        if (data.save_link) {
          window.location.href = data.save_link;
        } else {
          throw new Error('Link Samsung non disponibile');
        }
      } catch (err) {
        label.textContent = 'Errore — riprova';
        setTimeout(function(){ label.textContent = orig; }, 2200);
      }
    }
    </script>
</body>
</html>
