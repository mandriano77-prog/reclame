<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" id="themeColor" content="#0D0B1A">
  <title>Wallet Ads</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      background: var(--bg, #0D0B1A);
      color: var(--fg, #fff);
      min-height: 100vh;
      width: 100vw;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 32px 24px;
      min-height: 100vh;
      position: relative;
    }
    /* Background image layer */
    .bg-image {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      display: none;
    }
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: none;
    }
    body > * { position: relative; z-index: 2; }

    .top { width: 100%; max-width: 420px; }
    .brand-row {
      display: flex; align-items: center; gap: 10px;
      opacity: 0.6; font-size: 13px; letter-spacing: 0.04em;
    }
    .brand-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent, #00D4AA); }
    .main {
      width: 100%; max-width: 420px;
      text-align: center;
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px;
    }
    .logo-area {
      width: 320px; max-width: 75vw;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .logo-area img {
      width: 100%; height: auto;
      object-fit: contain;
    }
    .logo-letter {
      display: none;
    }
    .cta-section { width: 100%; max-width: 420px; }
    .text-section {
      margin-top: 12px;
    }
    h1 {
      font-size: 26px; font-weight: 700; line-height: 1.2;
      letter-spacing: -0.02em;
      color: var(--fg, #ffffff);
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    h1 small {
      display: block;
      font-size: 15px; font-weight: 400;
      opacity: 0.65;
      margin-top: 8px;
      letter-spacing: 0;
      line-height: 1.4;
    }
    .claim {
      font-size: 14px; line-height: 1.5;
      opacity: 0.5;
      max-width: 300px;
      margin: 8px auto 0;
    }
    .cta {
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px 24px;
      background: var(--cta-bg, #CCFF00);
      color: #000;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s ease;
      font-family: inherit;
      box-shadow: 0 8px 32px -4px rgba(204,255,0,0.25);
    }
    .cta:active { transform: scale(0.98); }
    .cta[disabled] { opacity: 0.6; cursor: default; }
    .cta svg { width: 22px; height: 22px; }
    .footnote {
      text-align: center;
      font-size: 12px;
      opacity: 0.4;
      margin-top: 16px;
    }
    .error {
      color: #ff6b6b;
      font-size: 14px;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-image" id="bgImage"></div>
  <div class="bg-overlay" id="bgOverlay"></div>

  <div class="top">
    <div class="brand-row">
      <span class="brand-dot"></span>
      <span>Powered by Wallet Ads</span>
    </div>
  </div>

  <div class="main">
    <!-- 1. Logo -->
    <div class="logo-area" id="logoArea">
      <span class="logo-letter" id="logoLetter">&middot;</span>
    </div>

    <!-- 2. Descriptive text after logo -->
    <div class="text-section">
      <h1 id="headline">
        <span id="brandName">Aggiungi al Wallet</span>
        <small id="subheadline">Sblocca offerte e novità sul tuo iPhone</small>
      </h1>
      <p class="claim" id="claim"></p>
    </div>

    <!-- 3. CTA button below text -->
    <div class="cta-section">
      <button class="cta" id="installBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="6" width="18" height="13" rx="2"/>
          <path d="M3 10h18"/>
        </svg>
        <span id="btnLabel">Aggiungi al Wallet</span>
      </button>
      <div class="error" id="error"></div>
    </div>

    <div class="footnote">
      Nessun dato richiesto · Nessun account · Cancellabile in qualsiasi momento
    </div>
  </div>

  <script>
    (function () {
      const slug = location.pathname.replace(/^\/+|\/+$/g, '');
      const params = new URLSearchParams(location.search);
      const campaignId = params.get('c') || params.get('campaign_id');
      const utm = {};
      ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'].forEach(k => {
        const v = params.get(k);
        if (v) utm[k] = v;
      });

      const el = {
        logoArea: document.getElementById('logoArea'),
        logoLetter: document.getElementById('logoLetter'),
        brandName: document.getElementById('brandName'),
        sub: document.getElementById('subheadline'),
        claim: document.getElementById('claim'),
        btn: document.getElementById('installBtn'),
        btnLabel: document.getElementById('btnLabel'),
        error: document.getElementById('error'),
        bgImage: document.getElementById('bgImage'),
        bgOverlay: document.getElementById('bgOverlay')
      };

      function applyColors(bg, fg, accent) {
        const root = document.documentElement.style;
        root.setProperty('--bg', bg);
        root.setProperty('--fg', fg);
        root.setProperty('--accent', accent);
        root.setProperty('--cta-bg', accent);
        document.getElementById('themeColor').content = bg;
        // Force body background in case CSS var isn't applied
        document.body.style.background = bg;
        document.body.style.color = fg;
      }

      async function loadBrand() {
        try {
          const r = await fetch(`/api/v1/brands/by-slug/${encodeURIComponent(slug)}`);
          if (!r.ok) return;
          const brand = await r.json();
          const c = brand.config || {};

          // Apply brand colors
          const bg = c.backgroundColor || '#0D0B1A';
          const fg = c.foregroundColor || '#FFFFFF';
          const accent = c.labelColor || '#00D4AA';
          applyColors(bg, fg, accent);

          // Brand name & text
          if (brand.name) {
            el.logoLetter.textContent = brand.name.charAt(0).toUpperCase();
            el.brandName.textContent = brand.name;
            document.title = `${brand.name} · Wallet Ads`;
          }
          if (c.headline) el.brandName.textContent = c.headline;
          if (c.subheadline) el.sub.textContent = c.subheadline;
          if (c.claim) el.claim.textContent = c.claim;
          if (c.button_label) el.btnLabel.textContent = c.button_label;

          // Always try to load brand logo from endpoint
          const logoImg = new Image();
          logoImg.onload = () => {
            el.logoLetter.style.display = 'none';
            const img = document.createElement('img');
            img.src = logoImg.src;
            img.alt = brand.name || 'Logo';
            el.logoArea.appendChild(img);
          };
          logoImg.src = `/api/v1/brands/by-slug/${encodeURIComponent(slug)}/logo?t=${Date.now()}`;

          // Always try to load background image from endpoint
          const bgImg = new Image();
          bgImg.onload = () => {
            el.bgImage.style.backgroundImage = `url(${bgImg.src})`;
            el.bgImage.style.display = 'block';
            el.bgOverlay.style.background = `linear-gradient(180deg, ${bg}cc 0%, ${bg}40 40%, ${bg}cc 100%)`;
            el.bgOverlay.style.display = 'block';
          };
          bgImg.src = `/api/v1/brands/by-slug/${encodeURIComponent(slug)}/landing-bg?t=${Date.now()}`;

        } catch (e) { console.error(e); }
      }

      async function install() {
        el.btn.disabled = true;
        el.error.textContent = '';
        el.btnLabel.innerHTML = '<span class="spinner"></span>';

        try {
          const r = await fetch('/api/v1/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              brand_slug: slug,
              campaign_id: campaignId || null,
              utm: Object.keys(utm).length ? utm : null
            })
          });
          if (!r.ok) {
            const err = await r.json().catch(() => ({}));
            throw new Error(err.error || 'Errore download pass');
          }
          const blob = await r.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'pass.pkpass';
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 5000);
          el.btnLabel.textContent = 'Aperto in Wallet';
          setTimeout(() => { el.btn.disabled = false; el.btnLabel.textContent = 'Aggiungi di nuovo'; }, 2000);
        } catch (e) {
          el.error.textContent = e.message;
          el.btn.disabled = false;
          el.btnLabel.textContent = 'Riprova';
        }
      }

      el.btn.addEventListener('click', install);
      loadBrand();
    })();
  </script>
</body>
</html>
