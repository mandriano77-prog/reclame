<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nudj Pass</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0D0B1A 0%, #1E1A36 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #ffffff;
        }

        .loading {
            text-align: center;
            font-size: 14px;
            color: #00D4AA;
            opacity: 0.7;
        }

        .container {
            width: 100%;
            max-width: 420px;
            opacity: 0;
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00D4AA 0%, #00A88A 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            font-weight: 600;
            color: #0D0B1A;
        }

        .brand-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .brand-subtitle {
            font-size: 13px;
            color: #7C3AED;
            opacity: 0.8;
        }

        .pass-card {
            background: linear-gradient(135deg, #1E1A36 0%, #2D2645 100%);
            border: 1px solid #3A3556;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 212, 170, 0.1);
        }

        .pass-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .pass-type {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00D4AA;
            font-weight: 600;
        }

        .pass-serial {
            font-size: 10px;
            color: #7C3AED;
            opacity: 0.6;
            text-align: right;
        }

        .pass-content {
            margin-bottom: 20px;
        }

        .field-group {
            margin-bottom: 16px;
        }

        .field-group:last-child {
            margin-bottom: 0;
        }

        .field-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #00D4AA;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .field-value {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }

        .field-value.secondary {
            font-size: 14px;
            opacity: 0.9;
        }

        .field-value.auxiliary {
            font-size: 13px;
            opacity: 0.8;
        }

        .pass-barcode {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #3A3556;
            text-align: center;
        }

        .qr-code {
            display: inline-block;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .qr-code img {
            width: 120px;
            height: 120px;
            display: block;
        }

        .barcode-hint {
            font-size: 11px;
            color: #7C3AED;
            opacity: 0.6;
        }

        .cta-section {
            margin-bottom: 16px;
        }

        .cta-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00D4AA 0%, #00A88A 100%);
            color: #0D0B1A;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            box-shadow: 0 4px 16px rgba(0, 212, 170, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 212, 170, 0.4);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        .wallet-icon {
            width: 20px;
            height: 20px;
            display: inline-block;
        }

        .secondary-cta {
            padding: 12px;
            background: transparent;
            color: #00D4AA;
            border: 1px solid #00D4AA;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            width: 100%;
            text-decoration: none;
            text-align: center;
        }

        .secondary-cta:hover {
            background: rgba(0, 212, 170, 0.1);
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: #7C3AED;
            opacity: 0.6;
        }

        .error {
            background: rgba(255, 67, 54, 0.1);
            border: 1px solid #FF4336;
            color: #FFB3B3;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }

        .error-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }

            .header {
                margin-bottom: 30px;
            }

            .brand-name {
                font-size: 20px;
            }

            .pass-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="loading">Caricamento...</div>
    </div>

    <script>
        // Parse URL query parameter
        function getQueryParam(name) {
            const url = new URL(window.location);
            return url.searchParams.get(name);
        }

        // Generate QR code using simple inline algorithm
        function generateQRCode(text, size = 120) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Simple placeholder QR - in production use qrcode.js library
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#0D0B1A';

            // Draw a simple pattern for visual representation
            const cellSize = size / 21;
            for (let i = 0; i < 21; i++) {
                for (let j = 0; j < 21; j++) {
                    if (Math.random() > 0.5) {
                        ctx.fillRect(i * cellSize, j * cellSize, cellSize, cellSize);
                    }
                }
            }

            return canvas.toDataURL('image/png');
        }

        // Format date
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('it-IT', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
        }

        // Main function to load and render pass
        async function loadPass() {
            const passId = getQueryParam('id');

            if (!passId) {
                renderError('Pass ID non trovato. Verifica il link.');
                return;
            }

            try {
                const response = await fetch(`/api/v1/landing/${passId}`);

                if (!response.ok) {
                    if (response.status === 404) {
                        renderError('Pass non trovato. Verifica il link.');
                    } else {
                        renderError('Errore nel caricamento del pass.');
                    }
                    return;
                }

                const data = await response.json();
                renderPass(data);
            } catch (error) {
                console.error('Error loading pass:', error);
                renderError('Errore nella connessione. Riprova più tardi.');
            }
        }

        function renderError(message) {
            const container = document.getElementById('container');
            container.innerHTML = `
                <div style="text-align: center;">
                    <div class="error">
                        <div class="error-icon">⚠️</div>
                        <div>${message}</div>
                    </div>
                </div>
            `;
        }

        function renderPass(data) {
            const { pass, template, brand, download_url } = data;

            // Get brand initial
            const initial = brand.name.charAt(0).toUpperCase();

            // Build field HTML
            let fieldsHtml = '';
            if (template.fields && template.fields.length > 0) {
                template.fields.forEach(field => {
                    const value = pass.field_values[field.key] || field.value || '';

                    if (field.type === 'header' || field.type === 'primary') {
                        fieldsHtml += `
                            <div class="field-group">
                                <div class="field-label">${field.label}</div>
                                <div class="field-value">${value}</div>
                            </div>
                        `;
                    } else if (field.type === 'secondary') {
                        fieldsHtml += `
                            <div class="field-group">
                                <div class="field-label">${field.label}</div>
                                <div class="field-value secondary">${value}</div>
                            </div>
                        `;
                    } else if (field.type === 'auxiliary') {
                        fieldsHtml += `
                            <div class="field-group">
                                <div class="field-label">${field.label}</div>
                                <div class="field-value auxiliary">${value}</div>
                            </div>
                        `;
                    }
                });
            }

            // Generate QR code
            const qrDataUrl = generateQRCode(download_url);

            const container = document.getElementById('container');
            container.innerHTML = `
                <div class="header">
                    <div class="brand-logo">${initial}</div>
                    <div class="brand-name">${brand.name}</div>
                    <div class="brand-subtitle">${template.name}</div>
                </div>

                <div class="pass-card">
                    <div class="pass-header">
                        <div class="pass-type">${template.pass_type}</div>
                        <div class="pass-serial">#${pass.serial_number.substring(0, 12)}</div>
                    </div>

                    <div class="pass-content">
                        ${fieldsHtml}
                    </div>

                    <div class="pass-barcode">
                        <div class="qr-code">
                            <img src="${qrDataUrl}" alt="QR Code">
                        </div>
                        <div class="barcode-hint">Scansiona per aggiungere a Wallet</div>
                    </div>
                </div>

                <div class="cta-section">
                    <a href="${download_url}" download class="cta-button">
                        <svg class="wallet-icon" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M20 8H4V4h16m0-2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 11h-4v2h4v-2z"/>
                        </svg>
                        Aggiungi a Apple Wallet
                    </a>
                </div>

                <button class="secondary-cta" onclick="copyToClipboard('${window.location.href}')">
                    Copia Link
                </button>

                <div class="footer">
                    Powered by Nudj
                </div>
            `;

            // Track view
            navigator.sendBeacon('/api/v1/landing/${pass.id}');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Link copiato!');
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        // Load pass when page is ready
        document.addEventListener('DOMContentLoaded', loadPass);
    </script>
</body>
</html>
