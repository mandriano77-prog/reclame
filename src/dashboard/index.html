<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nudj Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0D0B1A;
            --bg-secondary: #1E1A36;
            --bg-tertiary: #2D2645;
            --accent-teal: #00D4AA;
            --accent-purple: #7C3AED;
            --text-primary: #FFFFFF;
            --text-secondary: #B0A8C1;
            --border-color: #3A3556;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            overflow-y: auto;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-teal);
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-section {
            margin-bottom: 32px;
        }

        .nav-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-purple);
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .nav-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            color: var(--text-secondary);
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--accent-teal);
        }

        .nav-item.active {
            background: var(--accent-teal);
            color: var(--bg-primary);
            font-weight: 600;
        }

        .main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 28px;
            font-weight: 600;
        }

        .brand-selector {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .brand-selector:hover {
            background: var(--accent-purple);
            opacity: 0.8;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: var(--accent-teal);
            box-shadow: 0 4px 12px rgba(0, 212, 170, 0.1);
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-purple);
            margin-bottom: 8px;
            opacity: 0.7;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-teal);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-purple);
            margin-bottom: 8px;
            display: block;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-teal);
            box-shadow: 0 0 0 2px rgba(0, 212, 170, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .button {
            padding: 12px 24px;
            background: var(--accent-teal);
            color: var(--bg-primary);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 212, 170, 0.3);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: transparent;
            color: var(--accent-teal);
            border: 1px solid var(--accent-teal);
        }

        .button.secondary:hover {
            background: rgba(0, 212, 170, 0.1);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .table thead th {
            background: var(--bg-tertiary);
            padding: 16px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-purple);
            font-weight: 600;
        }

        .table tbody td {
            padding: 14px 16px;
            border-top: 1px solid var(--border-color);
            font-size: 14px;
        }

        .table tbody tr:hover {
            background: var(--bg-tertiary);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.active {
            background: rgba(0, 212, 170, 0.2);
            color: var(--accent-teal);
        }

        .badge.inactive {
            background: rgba(124, 58, 237, 0.2);
            color: var(--accent-purple);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            font-size: 12px;
        }

        .action-btn {
            padding: 4px 8px;
            background: var(--accent-purple);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .action-btn:hover {
            opacity: 1;
        }

        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .template-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .template-card:hover {
            border-color: var(--accent-teal);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 212, 170, 0.1);
        }

        .template-name {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .template-type {
            font-size: 12px;
            color: var(--accent-purple);
            opacity: 0.7;
            text-transform: uppercase;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 24px;
        }

        .qr-container {
            text-align: center;
            padding: 20px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin: 20px 0;
        }

        .qr-container canvas {
            max-width: 200px;
        }

        .copy-button {
            margin-top: 12px;
            width: 100%;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--accent-purple);
        }

        .success-message {
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid var(--accent-teal);
            color: var(--accent-teal);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .header {
                flex-direction: column;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div class="logo">◆ Nudj</div>

            <div class="nav-section">
                <div class="nav-label">Dashboard</div>
                <div class="nav-item active" onclick="switchSection('overview')">Overview</div>
                <div class="nav-item" onclick="switchSection('create-pass')">Crea Pass</div>
                <div class="nav-item" onclick="switchSection('recent-passes')">Pass Recenti</div>
                <div class="nav-item" onclick="switchSection('templates')">Template</div>
            </div>

            <div class="nav-section">
                <div class="nav-label">Setup</div>
                <div class="nav-item" onclick="switchSection('setup-brand')">Nuova Brand</div>
            </div>
        </div>

        <div class="main">
            <div class="header">
                <div class="header-title">Nudj Dashboard</div>
                <select class="brand-selector" id="brandSelector" onchange="changeBrand()">
                    <option value="">Seleziona Brand</option>
                </select>
            </div>

            <div class="content">
                <!-- Overview Section -->
                <div id="overview" class="section active">
                    <div class="section-title">Overview</div>
                    <div class="stats-grid" id="statsGrid">
                        <div class="loading">Caricamento statistiche...</div>
                    </div>
                </div>

                <!-- Create Pass Section -->
                <div id="create-pass" class="section">
                    <div class="section-title">Genera Nuovo Pass</div>
                    <div id="successMessage"></div>
                    <div class="form-group">
                        <label class="form-label">Template</label>
                        <select id="templateSelect" onchange="loadTemplateFields()">
                            <option value="">Seleziona un template</option>
                        </select>
                    </div>

                    <div id="fieldGroup"></div>

                    <div class="form-row">
                        <button class="button" onclick="generatePass()">Genera Pass</button>
                        <button class="button secondary" onclick="resetForm()">Reset</button>
                    </div>

                    <div id="passResult"></div>
                </div>

                <!-- Recent Passes Section -->
                <div id="recent-passes" class="section">
                    <div class="section-title">Pass Recenti</div>
                    <div id="passesTable" class="loading">Caricamento...</div>
                </div>

                <!-- Templates Section -->
                <div id="templates" class="section">
                    <div class="section-title">Template Disponibili</div>
                    <div id="templatesGrid" class="loading">Caricamento...</div>
                </div>

                <!-- Setup Brand Section -->
                <div id="setup-brand" class="section">
                    <div class="section-title">Crea Nuova Brand</div>
                    <div class="form-group">
                        <label class="form-label">Nome Brand</label>
                        <input type="text" id="brandName" placeholder="es. CoffeeShop">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Slug (URL-friendly)</label>
                        <input type="text" id="brandSlug" placeholder="es. coffeeshop">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Colore Primario (hex)</label>
                        <input type="text" id="brandColor" value="#00D4AA" placeholder="#00D4AA">
                    </div>
                    <button class="button" onclick="createBrand()">Crea Brand</button>
                </div>
            </div>
        </div>
    </div>

    <!-- QR Modal -->
    <div id="qrModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeQRModal()">&times;</button>
            <div class="modal-header">QR Code Pass</div>
            <div class="qr-container">
                <canvas id="qrCanvas"></canvas>
            </div>
            <input type="text" id="qrUrl" readonly style="margin-bottom: 12px;">
            <button class="button copy-button" onclick="copyQRUrl()">Copia Link</button>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let currentBrandId = null;

        // Initialize on load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadBrands();
            await refreshOverview();
            setInterval(refreshOverview, 30000); // Auto-refresh every 30s
        });

        // ===== Navigation =====
        function switchSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');

            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');

            if (sectionId === 'recent-passes') loadRecentPasses();
            if (sectionId === 'templates') loadTemplates();
        }

        // ===== Brands =====
        async function loadBrands() {
            try {
                const res = await fetch(`${API_BASE}/brands`);
                const brands = await res.json();

                const selector = document.getElementById('brandSelector');
                brands.forEach(brand => {
                    const option = document.createElement('option');
                    option.value = brand.id;
                    option.textContent = brand.name;
                    selector.appendChild(option);
                });

                if (brands.length > 0) {
                    selector.value = brands[0].id;
                    currentBrandId = brands[0].id;
                    await loadTemplates();
                    await refreshOverview();
                }
            } catch (error) {
                console.error('Error loading brands:', error);
            }
        }

        function changeBrand() {
            const selector = document.getElementById('brandSelector');
            currentBrandId = selector.value;
            refreshOverview();
            loadTemplates();
        }

        async function createBrand() {
            const name = document.getElementById('brandName').value;
            const slug = document.getElementById('brandSlug').value;
            const color = document.getElementById('brandColor').value;

            if (!name || !slug) {
                alert('Compila tutti i campi');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/brands`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name,
                        slug,
                        config: { primaryColor: color }
                    })
                });

                if (!res.ok) throw new Error('Failed to create brand');

                const brand = await res.json();
                alert('Brand creata con successo!');

                // Reload brands
                document.getElementById('brandSelector').innerHTML = '<option value="">Seleziona Brand</option>';
                await loadBrands();

                // Clear form
                document.getElementById('brandName').value = '';
                document.getElementById('brandSlug').value = '';
                document.getElementById('brandColor').value = '#00D4AA';
            } catch (error) {
                console.error('Error creating brand:', error);
                alert('Errore nella creazione della brand');
            }
        }

        // ===== Overview/Stats =====
        async function refreshOverview() {
            if (!currentBrandId) return;

            try {
                const res = await fetch(`${API_BASE}/analytics/${currentBrandId}`);
                const analytics = await res.json();

                const statsHtml = `
                    <div class="stat-card">
                        <div class="stat-label">Pass Attivi</div>
                        <div class="stat-value">${analytics.byStatus?.active || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Scan Totali</div>
                        <div class="stat-value">${analytics.events?.pass_scanned || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Visualizzazioni</div>
                        <div class="stat-value">${analytics.events?.landing_page_viewed || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Download</div>
                        <div class="stat-value">${analytics.events?.pass_downloaded || 0}</div>
                    </div>
                `;

                document.getElementById('statsGrid').innerHTML = statsHtml;
            } catch (error) {
                console.error('Error loading analytics:', error);
            }
        }

        // ===== Templates =====
        async function loadTemplates() {
            if (!currentBrandId) return;

            try {
                const res = await fetch(`${API_BASE}/templates?brand_id=${currentBrandId}`);
                const templates = await res.json();

                // Populate template select
                const select = document.getElementById('templateSelect');
                select.innerHTML = '<option value="">Seleziona un template</option>';
                templates.forEach(t => {
                    const option = document.createElement('option');
                    option.value = t.id;
                    option.textContent = t.name;
                    option.dataset.template = JSON.stringify(t);
                    select.appendChild(option);
                });

                // Populate templates grid
                const gridHtml = templates.map(t => `
                    <div class="template-card">
                        <div class="template-name">${t.name}</div>
                        <div class="template-type">${t.pass_type}</div>
                    </div>
                `).join('');

                document.getElementById('templatesGrid').innerHTML = gridHtml || '<p>No templates found</p>';
            } catch (error) {
                console.error('Error loading templates:', error);
            }
        }

        // ===== Create Pass =====
        function loadTemplateFields() {
            const select = document.getElementById('templateSelect');
            const templateJson = select.options[select.selectedIndex]?.dataset.template;

            if (!templateJson) {
                document.getElementById('fieldGroup').innerHTML = '';
                return;
            }

            const template = JSON.parse(templateJson);
            const fieldGroup = document.getElementById('fieldGroup');
            let html = '';

            if (template.fields) {
                template.fields.forEach(field => {
                    html += `
                        <div class="form-group">
                            <label class="form-label">${field.label}</label>
                            <input type="text" class="field-input" data-key="${field.key}" placeholder="${field.value || ''}">
                        </div>
                    `;
                });
            }

            html += `
                <div class="form-group">
                    <label class="form-label">Email Acquirente</label>
                    <input type="email" id="customerEmail" placeholder="email@example.com">
                </div>
            `;

            fieldGroup.innerHTML = html;
        }

        async function generatePass() {
            const templateSelect = document.getElementById('templateSelect');
            if (!templateSelect.value) {
                alert('Seleziona un template');
                return;
            }

            const fieldValues = {};
            document.querySelectorAll('.field-input').forEach(input => {
                fieldValues[input.dataset.key] = input.value;
            });

            const customerData = {
                email: document.getElementById('customerEmail')?.value || ''
            };

            try {
                const res = await fetch(`${API_BASE}/passes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        template_id: templateSelect.value,
                        field_values: fieldValues,
                        customer_data: customerData
                    })
                });

                if (!res.ok) throw new Error('Failed to generate pass');

                const pass = await res.json();

                // Show success message
                const msgDiv = document.getElementById('successMessage');
                msgDiv.innerHTML = `<div class="success-message">Pass generato con successo! Serial: ${pass.serial_number}</div>`;
                setTimeout(() => msgDiv.innerHTML = '', 5000);

                // Show result
                document.getElementById('passResult').innerHTML = `
                    <div style="margin-top: 24px; padding: 20px; background: var(--bg-secondary); border-radius: 8px; border: 1px solid var(--border-color);">
                        <div style="margin-bottom: 12px;"><strong>Pass ID:</strong> ${pass.id}</div>
                        <div style="margin-bottom: 12px;"><strong>Serial:</strong> ${pass.serial_number}</div>
                        <div style="margin-bottom: 12px;"><strong>Link Landing:</strong> <a href="${pass.landing_url}" target="_blank" style="color: var(--accent-teal);">${pass.landing_url}</a></div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                            <button class="button" onclick="window.location.href='${pass.download_url}'">Scarica .pkpass</button>
                            <button class="button secondary" onclick="showQRModal('${pass.landing_url}')">Mostra QR</button>
                        </div>
                    </div>
                `;

                // Reload passes list
                loadRecentPasses();
            } catch (error) {
                console.error('Error generating pass:', error);
                alert('Errore nella generazione del pass');
            }
        }

        function resetForm() {
            document.getElementById('templateSelect').value = '';
            document.getElementById('fieldGroup').innerHTML = '';
            document.getElementById('passResult').innerHTML = '';
        }

        // ===== Recent Passes =====
        async function loadRecentPasses() {
            if (!currentBrandId) return;

            try {
                const res = await fetch(`${API_BASE}/passes?brand_id=${currentBrandId}`);
                const passes = await res.json();

                const table = `
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Serial</th>
                                <th>Status</th>
                                <th>Creato</th>
                                <th>Azioni</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${passes.slice(0, 10).map(p => `
                                <tr>
                                    <td>${p.serial_number.substring(0, 12)}</td>
                                    <td><span class="badge ${p.status}">${p.status}</span></td>
                                    <td>${new Date(p.created_at).toLocaleDateString('it-IT')}</td>
                                    <td>
                                        <div class="action-buttons">
                                            <button class="action-btn" onclick="window.location.href='${p.download_url}'">↓</button>
                                            <button class="action-btn" onclick="showQRModal('${p.landing_url}')">QR</button>
                                            <button class="action-btn" onclick="copyLink('${p.landing_url}')">⧉</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;

                document.getElementById('passesTable').innerHTML = table;
            } catch (error) {
                console.error('Error loading passes:', error);
            }
        }

        // ===== QR Modal =====
        function showQRModal(url) {
            document.getElementById('qrUrl').value = url;
            const canvas = document.getElementById('qrCanvas');

            QRCode.toCanvas(canvas, url, {
                width: 200,
                color: { dark: '#0D0B1A', light: '#FFFFFF' }
            }, (err) => {
                if (err) console.error('QR Error:', err);
            });

            document.getElementById('qrModal').classList.add('active');
        }

        function closeQRModal() {
            document.getElementById('qrModal').classList.remove('active');
        }

        function copyQRUrl() {
            const url = document.getElementById('qrUrl').value;
            navigator.clipboard.writeText(url).then(() => {
                alert('Copiato!');
            });
        }

        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                alert('Link copiato!');
            });
        }
    </script>
</body>
