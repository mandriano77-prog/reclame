<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#8B5CF6">
  <title>Attivazione pass — Filodiretto</title>
  <link rel="stylesheet" href="/shared/theme.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #0f172a;
      min-height: 100vh;
      padding: 24px 20px 48px;
    }
    .wrap { max-width: 480px; margin: 0 auto; }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 28px 24px;
      margin-bottom: 16px;
    }
    .badge { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #8B5CF6; }
    h1 { font-size: 22px; margin: 8px 0 4px; }
    .meta { color: #64748b; font-size: 14px; margin-bottom: 20px; }
    h2 { font-size: 15px; margin: 20px 0 10px; }
    .consent { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; font-size: 14px; color: #334155; }
    .consent input { margin-top: 3px; flex-shrink: 0; }
    .privacy-required {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 16px;
      margin: 16px 0 0;
      background: #f8fafc;
    }
    .privacy-required label { display: flex; gap: 10px; align-items: flex-start; font-size: 14px; color: #0f172a; cursor: pointer; }
    .privacy-required .hint { font-size: 12px; color: #64748b; margin-top: 8px; margin-left: 26px; }
    .privacy-divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 20px 0 4px;
    }
    button.primary {
      width: 100%;
      padding: 14px;
      background: #7C3AED;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    button.primary:disabled { opacity: 0.45; cursor: not-allowed; }
    a.dl {
      display: block;
      text-align: center;
      margin-top: 16px;
      padding: 14px;
      background: #0f172a;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
    .err { color: #b91c1c; background: #fef2f2; padding: 12px; border-radius: 8px; font-size: 14px; }
    .hidden { display: none; }
    select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="loading" class="card"><p>Caricamento…</p></div>
    <div id="error" class="card hidden"><p class="err" id="errorText"></p></div>
    <div id="formCard" class="card hidden">
      <div class="badge">Filodiretto</div>
      <h1 id="brandTitle">Attivazione pass</h1>
      <p class="meta" id="memberLine"></p>
      <div id="tplWrap" class="hidden">
        <label for="template">Template pass</label>
        <select id="template"></select>
      </div>
      <div class="privacy-required">
        <label for="privacy-accepted">
          <input type="checkbox" id="privacy-accepted" name="privacy-accepted">
          <span>Ho letto e accetto l'<a href="/privacy-policy" target="_blank" rel="noopener noreferrer">informativa privacy</a></span>
        </label>
        <p class="hint">* Obbligatorio per attivare il pass</p>
      </div>
      <hr class="privacy-divider">
      <h2>Preferenze privacy (opzionali)</h2>
      <div id="consents"></div>
      <button type="button" class="primary" id="submit-activation" disabled>Conferma e genera pass</button>
    </div>
  </div>
  <script>
    const CONSENT_LABELS = {
      birthday: 'Compleanno e auguri',
      welfare_geo: 'Welfare e servizi in base alla sede',
      gamification: 'Challenge e sfide',
      climate_survey: 'Sondaggi clima aziendale',
      partner_offers: 'Offerte partner'
    };

    function extractActivationToken() {
      const qs = new URLSearchParams(location.search);
      const fromQuery = qs.get('token') || qs.get('t');
      if (fromQuery) return fromQuery.trim();
      const m = location.pathname.match(/\/activate\/([^/?#]+)/i);
      return m ? decodeURIComponent(m[1]).trim() : '';
    }

    const token = extractActivationToken();
    const API = '/api/v1';

    let state = null;

    const privacyBox = document.getElementById('privacy-accepted');
    const submitBtn = document.getElementById('submit-activation');

    privacyBox.addEventListener('change', () => {
      submitBtn.disabled = !privacyBox.checked;
    });

    async function load() {
      if (!token) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('errorText').textContent = 'Link non valido o scaduto.';
        return;
      }
      const res = await fetch(`${API}/activate/${encodeURIComponent(token)}`, { cache: 'no-store' });
      const data = await res.json().catch(() => ({}));
      document.getElementById('loading').classList.add('hidden');
      if (!res.ok) {
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('errorText').textContent = data.error || 'Link non valido o scaduto.';
        return;
      }
      state = data;
      if (data.already_activated) {
        if (data.thank_you_url) {
          window.location.replace(data.thank_you_url);
          return;
        }
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('errorText').textContent = 'Attivazione già completata.';
        return;
      }
      document.getElementById('formCard').classList.remove('hidden');
      document.getElementById('brandTitle').textContent = data.member.brand_name || 'Attivazione pass';
      const name = [data.member.first_name, data.member.last_name].filter(Boolean).join(' ');
      document.getElementById('memberLine').textContent =
        (name ? name + ' · ' : '') + (data.member.email || '') +
        (data.member.employee_id ? ' · #' + data.member.employee_id : '');

      const consentsEl = document.getElementById('consents');
      (data.consent_types || []).forEach((type) => {
        const label = CONSENT_LABELS[type] || type;
        consentsEl.innerHTML += `<label class="consent"><input type="checkbox" data-consent="${type}"><span>${label}</span></label>`;
      });

      if (data.templates && data.templates.length > 1) {
        document.getElementById('tplWrap').classList.remove('hidden');
        const sel = document.getElementById('template');
        data.templates.forEach((t) => {
          const o = document.createElement('option');
          o.value = t.id;
          o.textContent = t.name || t.id;
          sel.appendChild(o);
        });
      }
    }

    submitBtn.addEventListener('click', async () => {
      if (!privacyBox.checked) return;
      submitBtn.disabled = true;
      const consents = {};
      document.querySelectorAll('[data-consent]').forEach((el) => {
        consents[el.getAttribute('data-consent')] = el.checked;
      });
      const template_id = document.getElementById('template')?.value || undefined;
      try {
        const res = await fetch(`${API}/activate/${encodeURIComponent(token)}`, {
          method: 'POST',
          cache: 'no-store',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            consents,
            template_id,
            privacy_accepted: privacyBox.checked
          })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Errore attivazione');
        if (data.thank_you_url) {
          window.location.assign(data.thank_you_url);
          return;
        }
        if (data.download_url) {
          window.location.assign(data.download_url);
          return;
        }
        throw new Error('Link di download non disponibile');
      } catch (e) {
        alert(e.message);
        submitBtn.disabled = !privacyBox.checked;
      }
    });

    load();
    window.addEventListener('pageshow', (ev) => {
      if (ev.persisted) load();
    });
  </script>
</body>
</html>
