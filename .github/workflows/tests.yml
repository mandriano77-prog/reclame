name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: node --test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Runs every scripts/*.test.js via glob (new test files are picked up automatically),
      # excluding scripts/fd-* which are HR/Filodiretto-scoped (out of the Reclame perimeter and
      # guarded by check:reclame-scope; the HR pipeline covers them). `npm test` uses the same glob.
      - name: Run unit and contract tests
        run: npm test
